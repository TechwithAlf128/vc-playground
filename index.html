<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VC Playground - Investment Analysis Tool</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>💰 VC Playground</h1>
                <p>Analyze your venture capital investments</p>
            </div>
            <div class="theme-toggle">
                <button id="themeBtn" class="theme-btn">🌙 Dark Mode</button>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <!-- Metrics Cards -->
            <section class="metrics-section">
                <div class="metric-card">
                    <div class="metric-label">Total Invested</div>
                    <div class="metric-value" id="totalInvested">$0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Number of Deals</div>
                    <div class="metric-value" id="dealCount">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Current Portfolio Value</div>
                    <div class="metric-value" id="portfolioValue">$0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Average ROI</div>
                    <div class="metric-value" id="avgROI">0%</div>
                </div>
            </section>

            <!-- Charts Row -->
            <section class="charts-section">
                <div class="chart-container">
                    <h3>Sector Breakdown</h3>
                    <canvas id="sectorChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Stage Distribution</h3>
                    <canvas id="stageChart"></canvas>
                </div>
            </section>

            <!-- Controls -->
            <section class="controls-section">
                <button id="addBtn" class="btn btn-primary">+ Add Investment</button>
                <div class="filter-group">
                    <select id="sectorFilter" class="filter-select">
                        <option value="">All Sectors</option>
                    </select>
                    <select id="stageFilter" class="filter-select">
                        <option value="">All Stages</option>
                        <option value="Seed">Seed</option>
                        <option value="Series A">Series A</option>
                        <option value="Series B">Series B</option>
                        <option value="Series C">Series C+</option>
                        <option value="Growth">Growth</option>
                        <option value="Late Stage">Late Stage</option>
                    </select>
                    <button id="exportBtn" class="btn btn-secondary">📥 Export JSON</button>
                    <button id="importBtn" class="btn btn-secondary">📤 Import JSON</button>
                    <input type="file" id="importFile" style="display:none;" accept=".json">
                </div>
            </section>

            <!-- Investments Table -->
            <section class="table-section">
                <h3>Investment Portfolio</h3>
                <div class="table-wrapper">
                    <table id="investmentsTable" class="investments-table">
                        <thead>
                            <tr>
                                <th>Company</th>
                                <th>Sector</th>
                                <th>Stage</th>
                                <th>Invested</th>
                                <th>Current Value</th>
                                <th>ROI</th>
                                <th>MOIC</th>
                                <th>Notes</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="investmentsBody">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Add Investment</h2>
            <form id="investmentForm">
                <div class="form-group">
                    <label for="companyName">Company Name *</label>
                    <input type="text" id="companyName" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="sector">Sector *</label>
                        <input type="text" id="sector" placeholder="e.g., AI, Fintech, Biotech" required>
                    </div>
                    <div class="form-group">
                        <label for="stage">Stage *</label>
                        <select id="stage" required>
                            <option value="">Select Stage</option>
                            <option value="Seed">Seed</option>
                            <option value="Series A">Series A</option>
                            <option value="Series B">Series B</option>
                            <option value="Series C">Series C+</option>
                            <option value="Growth">Growth</option>
                            <option value="Late Stage">Late Stage</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="amountInvested">Amount Invested ($) *</label>
                        <input type="number" id="amountInvested" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="currentValuation">Current Valuation ($) *</label>
                        <input type="number" id="currentValuation" min="0" step="0.01" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="investmentNotes">Notes</label>
                    <textarea id="investmentNotes" rows="3" placeholder="Key insights, performance notes, etc."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Investment</button>
                    <button type="button" id="deleteBtn" class="btn btn-danger" style="display:none;">Delete</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
